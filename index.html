<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ithopiia - نظام إدارة المجموعات الكنسية</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='4' fill='%236a9a9b'/><text x='16' y='23' font-size='20' text-anchor='middle' fill='white' font-family='sans-serif'>i</text></svg>">
  <link rel="stylesheet" href="css/style.css?v=5">
</head>
<body>
  <div class="top-bar">
    <div class="brand">ithopiia</div>
    <div class="top-nav">
      <button id="admin-nav-btn" class="top-nav-btn" style="display:none" onclick="App.showAdmin()">لوحة المشرف</button>
      <button id="profile-nav-btn" class="top-nav-btn" style="display:none" onclick="App.showDashboard()">الملف الشخصي</button>
    </div>
    <button id="logout-btn" class="logout-btn" style="display:none">تسجيل الخروج</button>
  </div>


  <div id="view-auth" class="view">
    <div class="auth-container">
      <div class="auth-brand">
        <h1>ithopiia</h1>
        <p>نظام إدارة المجموعات الكنسية – إثيوبيا</p>
      </div>

      <div id="auth-google" class="auth-form">
        <h2>تسجيل الدخول</h2>
        <p class="auth-subtitle">سجل الدخول باستخدام حساب Google الخاص بك</p>
        <button id="google-auth-btn" class="btn-google">تسجيل الدخول باستخدام Google</button>
        <div id="auth-error" class="auth-error"></div>
      </div>

      <div id="auth-complete-profile" class="auth-form" style="display:none">
        <h2>أكمل ملفك الشخصي</h2>
        <label for="comp-name">الاسم الكامل</label>
        <input type="text" id="comp-name" name="comp-name" placeholder="الاسم الكامل" autocomplete="name" oninput="App.validateProfileForm()">
        <label for="comp-year">تاريخ الميلاد</label>
        <div class="date-selects">
          <select id="comp-year" name="comp-year" onchange="App.validateProfileForm()"><option value="">السنة</option></select>
          <select id="comp-month" name="comp-month" style="display:none" onchange="App.validateProfileForm()"><option value="">الشهر</option></select>
          <select id="comp-day" name="comp-day" style="display:none" onchange="App.validateProfileForm()"><option value="">اليوم</option></select>
        </div>
        <label for="comp-elkaraza">الكرازة</label>
        <select id="comp-elkaraza" name="comp-elkaraza" onchange="App.validateProfileForm()">
          <option value="">هل حضرت الكرازة؟</option>
          <option value="no">لا</option>
          <option value="yes">نعم</option>
        </select>
        <label for="comp-gender">النوع</label>
        <select id="comp-gender" name="comp-gender" onchange="App.validateProfileForm()">
          <option value="">النوع</option>
          <option value="male">ذكر</option>
          <option value="female">أنثى</option>
        </select>
        <label for="comp-whatsapp">رقم واتساب</label>
        <input type="tel" id="comp-whatsapp" name="comp-whatsapp" placeholder="رقم واتساب" oninput="App.validateProfileForm()">
        <button id="comp-btn" class="btn btn-primary" disabled>حفظ</button>
        <div id="comp-error" class="auth-error"></div>
      </div>
    </div>
  </div>

  <div id="view-dashboard" class="view">
    <div class="container">
      <h2>الملف الشخصي</h2>
      <div class="tabs">
        <button class="tab-btn active" data-tab="tab-dashboard">الملف الشخصي</button>
        <button class="tab-btn" data-tab="dash-tab-account">معلومات الحساب</button>
        <button class="tab-btn" data-tab="dash-tab-feedback">الملاحظات</button>
        <button class="tab-btn" data-tab="dash-tab-leaderboard">المتصدرين</button>
      </div>
      <div id="tab-dashboard" class="tab-content active">
        <div id="dash-user-info"></div>
        <div id="dash-claim-area"></div>
        <div id="dash-stats"></div>
      </div>
      <div id="dash-tab-account" class="tab-content">
        <div id="dash-account-info"></div>
      </div>
      <div id="dash-tab-feedback" class="tab-content">
        <div id="dash-feedback"></div>
      </div>
      <div id="dash-tab-leaderboard" class="tab-content">
        <div id="dash-leaderboard-content"></div>
      </div>
    </div>
  </div>

  <div id="view-admin" class="view">
    <div class="container">
      <h2>لوحة المشرف</h2>
      <div class="tabs">
        <button class="tab-btn active" data-tab="tab-evaluation">📊 التقييم اليومي</button>
        <button class="tab-btn" data-tab="tab-users">👥 المستخدمين</button>
        <button class="tab-btn" data-tab="admin-tab-notes">📝 ملاحظات</button>
        <button class="tab-btn" data-tab="admin-tab-leaderboard">🏆 المتصدرين</button>
        <button class="tab-btn" data-tab="admin-tab-userinfo">ℹ️ المعلومات الشخصية</button>
        <button class="tab-btn" data-tab="admin-tab-rooms">🚪 الغرف</button>
      </div>
      <div id="tab-evaluation" class="tab-content active"></div>
      <div id="tab-users" class="tab-content"></div>
      <div id="admin-tab-notes" class="tab-content"></div>
      <div id="admin-tab-leaderboard" class="tab-content"></div>
      <div id="admin-tab-userinfo" class="tab-content"></div>
      <div id="admin-tab-rooms" class="tab-content"></div>
    </div>
  </div>

  <script src="src/config.js?v=2"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-database-compat.js"></script>
  <script>firebase.initializeApp(CONFIG.firebase)</script>
  <script src="src/store.js?v=9"></script>
  <script src="src/auth.js?v=4"></script>
  <script src="src/timer.js?v=3"></script>
  <script src="src/points.js?v=4"></script>
  <script src="src/evaluation.js?v=10"></script>
  <script src="src/leaderboard.js?v=5"></script>
  <script src="src/admin.js?v=9"></script>
  <script src="src/dashboard.js?v=5"></script>
  <script src="src/app.js?v=6"></script>
</body>
</html>
